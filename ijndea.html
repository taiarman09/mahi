<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Search Redirect</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

  <!-- ✅ Navbar -->
  <header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid d-flex justify-content-between">
        <a class="navbar-brand fw-bold" href="#" style="font-style: italic;">MAHI</a>

        <!-- Toggler -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent"
          aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Search -->
        <div class="collapse navbar-collapse" id="navbarContent">
          <form onsubmit="return redirectToProduct(event)" class="d-flex ms-auto mt-2 mt-lg-0" role="search">
            <input class="form-control me-2" type="search" placeholder="Search any product..." aria-label="Search"
              id="searchInput">
            <button class="btn btn-outline-primary" type="submit">
              <i class="fas fa-search"></i>
            </button>
          </form>
        </div>
      </div>
    </nav>
  </header>


  <!-- ✅ Sample Content -->
  <section class="mt-5 pt-5 text-center">
    <h2>Welcome to MAHI Store</h2>
    <p>Search any product from the navbar above 👆</p>
  </section>


  <!-- ✅ Single JS function -->
  <script>
    function redirectToProduct(event) {
      event.preventDefault();

      let query = document.getElementById("searchInput").value.toLowerCase().trim();

      // Product pages mapping
      const productPages = {
        "mobile": "mobile.html",
        "laptop": "laptop.html",
        "watch": "watch.html",
        "headphone": "headphone.html",
        "makeup": "makeup.html",
        "shoes": "shoes.html"
      };

      if (productPages[query]) {
        window.location.href = productPages[query];
      } else {
        window.location.href = "notfound.html";
      }

      return false;
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
