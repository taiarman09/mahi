<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Search Redirect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
  <body>
    <header class="">
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#" style="font-style: italic;">MAHI</a>
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <ul class="dropdown-menu">
                  <li><a class="dropdown-item" href="#">Action</a></li>
                  <li><a class="dropdown-item" href="#">Another action</a></li>
                </ul>
              </li>
            </ul>
            <!-- Search Form -->
            <form class="d-flex" role="search" onsubmit="return redirectPage(event)">
              <input class="form-control me-2" id="searchInput" type="search" placeholder="Search page..." aria-label="Search">
              <button class="btn btn-primary" type="submit">Go</button>
            </form>
          
        </div>
      </nav>
    </header>























    

    <script>
      function redirectPage(event) {
        event.preventDefault(); // stop default form submit
        let query = document.getElementById("searchInput").value.toLowerCase().trim();

        // 🔹 yaha apne product pages map karo
        const pages = {
          "home": "index.html",
          "mobile": "mobile.html",
          "laptop": "laptop.html",
          "watch": "watch.html",
          "headphone": "headphone.html"
        };

        if (pages[query]) {
          window.location.href = pages[query]; // redirect to page
        } else {
          alert("Page not found!");
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous"></script>
  </body>
</html>
